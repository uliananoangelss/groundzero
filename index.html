    <script>
        const cardData = [
            { id: 1, start: 6, image: 'GTRCARD1copy.png' },
            { id: 2, start: 49, image: 'GTRCARD2copy.png' },
            { id: 3, start: 10, image: 'GTRCARD3copy.png' },
            { id: 4, start: 54, image: 'GTRCARD4copy.png' },
            { id: 5, start: 75, image: 'GTRCARD5copy.png' },
            { id: 6, start: 63, image: 'GTRCARD6copy.png' },
            { id: 7, start: 63, image: 'GTRCARD7copy.png' },
            { id: 8, start: 78, image: 'GTRCARD8copy.png' },
            { id: 9, start: 104, image: 'GTRCARD9copy.png' },
            { id: 10, start: 81, image: 'GTRCARD10copy.png' }
        ];

        const reelEl = document.getElementById('reel');
        const CARD_HEIGHT_DESKTOP = 420;
        const CARD_HEIGHT_MOBILE = 324;
        const TOTAL_SETS = 8;
        const START_SPEED = 38;
        let isSpinning = false;
        let isProcessing = false;
        let currentY = 0;
        let speed = START_SPEED;
        let animationFrameId;
        let winningCard = null;
        let activeCardHeight = window.innerWidth < 768 ? CARD_HEIGHT_MOBILE : CARD_HEIGHT_DESKTOP;
        let player = null;
        let pendingTrackStart = null;
        let isPlayerPlaying = false;
        let progressInterval = null;
        let isScrubbingProgress = false;

        function getReelCardHTML(card) {
            return `
                <div class="card-item w-full h-[${activeCardHeight}px] flex-shrink-0 bg-[#0a0a0a] border-[8px] border-[#151515] p-3 md:p-4 relative overflow-hidden card-shadow" style="height: ${activeCardHeight}px;">
                    <div class="absolute inset-0 bg-noise opacity-40 z-0"></div>
                    <div class="relative z-10 w-full h-full card-image-frame flex items-center justify-center p-2 md:p-3 overflow-hidden">
                        <img src="${card.image}" alt="GROUND ZERO CARD #${card.id}" class="card-image" loading="eager" draggable="false" />
                    </div>
                </div>
            `;
        }

        function getResultCardHTML(card) {
            return `
                <div class="w-full h-full bg-[#0a0a0a] border-[8px] border-[#151515] p-3 md:p-4 relative overflow-hidden card-shadow">
                    <div class="absolute inset-0 bg-noise opacity-40 z-0"></div>
                    <div class="relative z-10 w-full h-full card-image-frame flex items-center justify-center p-2 md:p-3 overflow-hidden">
                        <img src="${card.image}" alt="GROUND ZERO CARD #${card.id}" class="card-image" loading="eager" draggable="false" />
                    </div>
                </div>
            `;
        }

        function initMachine() {
            let html = '';
            for (let i = 0; i < TOTAL_SETS; i++) {
                cardData.forEach((card) => {
                    html += getReelCardHTML(card);
                });
            }
            reelEl.innerHTML = html;
            setLeverAngle(0);
        }

        function startIdleSpin() {
            if (!isSpinning) return;
            currentY -= speed;
            const setHeight = cardData.length * activeCardHeight;
            if (currentY <= -setHeight) currentY += setHeight;
            reelEl.style.transform = `translateY(${currentY}px)`;
            animationFrameId = requestAnimationFrame(startIdleSpin);
        }

        function startAmbientSpin() {
            if (isSpinning) return;
            reelEl.style.transition = 'none';
            isSpinning = true;
            speed = START_SPEED;
            cancelAnimationFrame(animationFrameId);
            startIdleSpin();
        }

        function rebuildOnResize() {
            const previousHeight = activeCardHeight;
            activeCardHeight = window.innerWidth < 768 ? CARD_HEIGHT_MOBILE : CARD_HEIGHT_DESKTOP;
            if (previousHeight === activeCardHeight) return;
            const normalized = previousHeight ? currentY / previousHeight : 0;
            initMachine();
            currentY = normalized * activeCardHeight;
            reelEl.style.transform = `translateY(${currentY}px)`;
        }

        window.addEventListener('resize', () => {
            rebuildOnResize();
            updateInstagramButtonVisibility();
        });

        const leverRod = document.getElementById('lever-rod');
        const leverBall = document.getElementById('lever-ball');
        const progressBar = document.getElementById('lever-progress');
        const progressFill = document.getElementById('lever-progress-bar');
        const TRIGGER_THRESHOLD = 0.95;

        let isDragging = false;
        let dragStartY = 0;
        let leverProgress = 0;
        let hasTriggered = false;
        let activePointerId = null;

        function getClientPoint(e) {
            if (e.touches && e.touches.length) return e.touches[0];
            if (e.changedTouches && e.changedTouches.length) return e.changedTouches[0];
            return e;
        }

        function setLeverAngle(progress) {
            const ballScale = 1 + progress * 0.8;
            const moveDown = progress * 180;
            leverBall.style.transform = `translateX(-50%) translateY(${moveDown}px) scale(${ballScale})`;

            const rodW = leverRod.offsetWidth;
            const rodH = leverRod.offsetHeight;
            const cx = rodW / 2;
            const topShift = moveDown;
            const topHalf = 8 + progress * 12;
            const botHalf = 8;

            leverRod.style.clipPath = `polygon(${cx - topHalf}px ${topShift}px, ${cx + topHalf}px ${topShift}px, ${cx + botHalf}px ${rodH}px, ${cx - botHalf}px ${rodH}px)`;

            if (progressBar) {
                progressBar.style.opacity = progress > 0.01 ? '1' : '0';
                progressFill.style.width = `${progress * 100}%`;
                progressFill.style.background = progress >= TRIGGER_THRESHOLD ? '#ef4444' : '#fff';
            }
        }

        function onDragStart(e) {
            if (isProcessing || hasTriggered) return;
            isDragging = true;
            leverBall.style.cursor = 'grabbing';
            const point = getClientPoint(e);
            activePointerId = point && 'identifier' in point ? point.identifier : 'mouse';
            dragStartY = point.clientY - (leverProgress * 200);
            e.preventDefault();
        }

        function onDragMove(e) {
            if (!isDragging || isProcessing) return;
            const point = getClientPoint(e);
            if (!point) return;
            if (point.identifier !== undefined && activePointerId !== null && activePointerId !== point.identifier) return;
            const delta = point.clientY - dragStartY;
            leverProgress = Math.max(0, Math.min(1, delta / 200));
            setLeverAngle(leverProgress);

            if (leverProgress >= TRIGGER_THRESHOLD && !hasTriggered) {
                hasTriggered = true;
                isDragging = false;
                activePointerId = null;
                leverBall.style.cursor = 'grab';
                triggerLeverPull();
            }
            e.preventDefault();
        }

        function onDragEnd(e) {
            if (!isDragging) return;
            const point = getClientPoint(e || {});
            if (point && point.identifier !== undefined && activePointerId !== null && activePointerId !== point.identifier) return;
            isDragging = false;
            activePointerId = null;
            leverBall.style.cursor = 'grab';
            if (!hasTriggered) {
                leverRod.style.transition = 'clip-path 0.5s cubic-bezier(0.25, 1, 0.5, 1)';
                leverBall.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)';
                leverProgress = 0;
                setLeverAngle(0);
                setTimeout(() => {
                    leverRod.style.transition = 'none';
                    leverBall.style.transition = 'none';
                }, 500);
            }
        }

        leverBall.addEventListener('mousedown', onDragStart);
        leverBall.addEventListener('touchstart', onDragStart, { passive: false });
        document.addEventListener('mousemove', onDragMove, { passive: false });
        document.addEventListener('touchmove', onDragMove, { passive: false });
        document.addEventListener('mouseup', onDragEnd);
        document.addEventListener('touchend', onDragEnd, { passive: false });
        document.addEventListener('touchcancel', onDragEnd, { passive: false });

        function triggerLeverPull() {
            leverRod.style.transition = 'clip-path 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
            leverBall.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
            leverProgress = 1;
            setLeverAngle(1);
            startLeverRumble();
            handleLeverPull();
        }

        let rumbleId = null;
        function startLeverRumble() {
            leverBall.style.transition = 'none';
            leverRod.style.transition = 'none';
            function rumble() {
                const offsetX = (Math.random() - 0.5) * 6;
                const offsetY = (Math.random() - 0.5) * 4;
                const baseDown = 180;
                const baseScale = 1.8;
                leverBall.style.transform = `translateX(calc(-50% + ${offsetX}px)) translateY(${baseDown + offsetY}px) scale(${baseScale})`;
                rumbleId = requestAnimationFrame(rumble);
            }
            rumbleId = requestAnimationFrame(rumble);
        }

        function stopLeverRumble() {
            if (rumbleId) {
                cancelAnimationFrame(rumbleId);
                rumbleId = null;
            }
            leverBall.style.transition = 'transform 0.3s ease-out';
            leverProgress = 1;
            setLeverAngle(1);
        }

        function handleLeverPull() {
            if (isProcessing) return;
            isProcessing = true;
            setTimeout(() => {
                isSpinning = false;
                cancelAnimationFrame(animationFrameId);
                stopLeverRumble();

                const winIndex = Math.floor(Math.random() * cardData.length);
                winningCard = cardData[winIndex];

                const targetSetIndex = 5;
                const targetDOMIndex = (targetSetIndex * cardData.length) + winIndex;
                const targetY = -(targetDOMIndex * activeCardHeight);

                reelEl.style.transition = 'none';
                reelEl.style.transform = `translateY(${currentY}px)`;
                reelEl.offsetHeight;
                reelEl.style.transition = 'transform 4s cubic-bezier(0.15, 0.85, 0.35, 1.05)';
                reelEl.style.transform = `translateY(${targetY}px)`;
                currentY = targetY;

                setTimeout(() => {
                    showResultScreen();
                }, 4300);
            }, 1200);
        }

        function showResultScreen() {
            const overlay = document.getElementById('result-overlay');
            const title = document.getElementById('result-title');
            const cardContainer = document.getElementById('result-card-container');
            const header = document.getElementById('result-header');
            const actions = document.getElementById('result-actions');
            overlay.scrollTop = 0;

            title.textContent = `GROUND ZERO CARD #${winningCard.id}`;
            cardContainer.innerHTML = getResultCardHTML(winningCard);
            if (window.innerWidth < 768) {
                cardContainer.style.width = 'min(80vw, 280px)';
                cardContainer.style.maxWidth = '280px';
                cardContainer.style.height = 'auto';
                cardContainer.style.maxHeight = '52vh';
                cardContainer.style.aspectRatio = '3 / 4';
            } else {
                cardContainer.style.maxWidth = '';
                cardContainer.style.maxHeight = '';
                cardContainer.style.width = '315px';
                cardContainer.style.height = `${CARD_HEIGHT_DESKTOP}px`;
                cardContainer.style.aspectRatio = '';
            }

            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            overlay.offsetHeight;
            overlay.classList.remove('opacity-0');

            setTimeout(() => {
                header.classList.remove('-translate-y-10', 'opacity-0');
                header.classList.add('translate-y-0', 'opacity-100');
            }, 300);

            setTimeout(() => {
                cardContainer.classList.remove('translate-y-10', 'opacity-0', 'scale-90');
                cardContainer.classList.add('translate-y-0', 'opacity-100', 'scale-105', 'md:scale-110');
            }, 600);

            setTimeout(() => {
                actions.classList.remove('translate-y-10', 'opacity-0');
                actions.classList.add('translate-y-0', 'opacity-100');
                playWinningTrack();
            }, 1200);
        }

        function onYouTubeIframeAPIReady() {
            const safePlayerVars = {
                autoplay: 0,
                controls: 0,
                modestbranding: 1,
                rel: 0,
                playsinline: 1,
                enablejsapi: 1
            };

            if (/^https?:$/i.test(window.location.protocol) && window.location.origin && window.location.origin !== 'null') {
                safePlayerVars.origin = window.location.origin;
            }

            player = new YT.Player('youtube-player-host', {
                videoId: '-hO0nKWutBo',
                host: 'https://www.youtube-nocookie.com',
                playerVars: safePlayerVars,
                events: {
                    onReady: () => {
                        const slider = document.getElementById('volume-slider');
                        if (slider) player.setVolume(Number(slider.value || 70));
                        updateVolumeIcon(Number(slider?.value || 70));
                        startProgressTracking();
                        if (pendingTrackStart !== null) {
                            playWinningTrack();
                        }
                    },
                    onStateChange: (event) => {
                        const state = event.data;
                        if (state === YT.PlayerState.PLAYING) {
                            isPlayerPlaying = true;
                        } else if (state === YT.PlayerState.PAUSED || state === YT.PlayerState.ENDED || state === YT.PlayerState.CUED) {
                            isPlayerPlaying = false;
                        }
                        updatePlayPauseUI();
                        if (state === YT.PlayerState.ENDED) {
                            updateProgressSlider();
                        }
                    }
                }
            });
        }
        window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

        function playWinningTrack() {
            if (!winningCard) return;
            pendingTrackStart = winningCard.start;
            if (!player || typeof player.loadVideoById !== 'function') return;
            const slider = document.getElementById('volume-slider');
            const volume = Number(slider?.value || 70);
            player.setVolume(volume);
            updateVolumeIcon(volume);
            player.loadVideoById({ videoId: '-hO0nKWutBo', startSeconds: winningCard.start, suggestedQuality: 'small' });
            player.playVideo();
            isPlayerPlaying = true;
            updatePlayPauseUI();
            updateProgressSlider();
            pendingTrackStart = null;
        }

        function updatePlayPauseUI() {
            const playIcon = document.getElementById('play-icon');
            const pauseIcon = document.getElementById('pause-icon');
            const playPauseBtn = document.getElementById('play-pause-btn');
            if (!playIcon || !pauseIcon || !playPauseBtn) return;
            playIcon.style.display = isPlayerPlaying ? 'none' : 'block';
            pauseIcon.style.display = isPlayerPlaying ? 'block' : 'none';
            playPauseBtn.setAttribute('aria-label', isPlayerPlaying ? 'Pause audio' : 'Play audio');
        }

        function updateVolumeIcon(volume) {
            const wave1 = document.getElementById('volume-wave-1');
            const wave2 = document.getElementById('volume-wave-2');
            const mute = document.getElementById('volume-mute');
            if (!wave1 || !wave2 || !mute) return;
            if (volume <= 0) {
                wave1.style.display = 'none';
                wave2.style.display = 'none';
                mute.style.display = 'block';
            } else if (volume < 45) {
                wave1.style.display = 'block';
                wave2.style.display = 'none';
                mute.style.display = 'none';
            } else {
                wave1.style.display = 'block';
                wave2.style.display = 'block';
                mute.style.display = 'none';
            }
        }

        function togglePlayback() {
            if (!player || typeof player.playVideo !== 'function') return;
            if (isPlayerPlaying) {
                player.pauseVideo();
                isPlayerPlaying = false;
            } else {
                player.playVideo();
                isPlayerPlaying = true;
            }
            updatePlayPauseUI();
        }

        function seekBy(seconds) {
            if (!player || typeof player.getCurrentTime !== 'function' || typeof player.seekTo !== 'function') return;
            const current = Number(player.getCurrentTime() || 0);
            const target = Math.max(0, current + seconds);
            player.seekTo(target, true);
            if (!isPlayerPlaying && typeof player.playVideo === 'function') {
                player.playVideo();
                isPlayerPlaying = true;
                updatePlayPauseUI();
            }
        }

        const volumeSliderEl = document.getElementById('volume-slider');
        if (volumeSliderEl) {
            volumeSliderEl.addEventListener('input', (e) => {
                const volume = Number(e.target.value);
                if (player && typeof player.setVolume === 'function') {
                    player.setVolume(volume);
                }
                updateVolumeIcon(volume);
            });
            updateVolumeIcon(Number(volumeSliderEl.value || 70));
        }

        const progressSliderEl = document.getElementById('progress-slider');
        if (progressSliderEl) {
            progressSliderEl.addEventListener('input', (e) => {
                isScrubbingProgress = true;
                seekToProgressValue(e.target.value);
            });
            progressSliderEl.addEventListener('change', (e) => {
                seekToProgressValue(e.target.value);
                isScrubbingProgress = false;
            });
            progressSliderEl.addEventListener('pointerdown', () => { isScrubbingProgress = true; });
            progressSliderEl.addEventListener('pointerup', (e) => {
                seekToProgressValue(e.target.value);
                isScrubbingProgress = false;
            });
        }

        document.getElementById('play-pause-btn')?.addEventListener('click', togglePlayback);


        function updateProgressSlider() {
            const progressSlider = document.getElementById('progress-slider');
            if (!progressSlider || !player || typeof player.getCurrentTime !== 'function' || typeof player.getDuration !== 'function' || isScrubbingProgress) return;
            const duration = Number(player.getDuration() || 0);
            const current = Number(player.getCurrentTime() || 0);
            if (!duration || !isFinite(duration)) {
                progressSlider.value = 0;
                return;
            }
            const nextValue = Math.max(0, Math.min(1000, Math.round((current / duration) * 1000)));
            progressSlider.value = String(nextValue);
        }

        function startProgressTracking() {
            if (progressInterval) clearInterval(progressInterval);
            progressInterval = setInterval(updateProgressSlider, 250);
        }

        function seekToProgressValue(value) {
            if (!player || typeof player.seekTo !== 'function' || typeof player.getDuration !== 'function') return;
            const duration = Number(player.getDuration() || 0);
            if (!duration || !isFinite(duration)) return;
            const target = Math.max(0, Math.min(duration, (Number(value) / 1000) * duration));
            player.seekTo(target, true);
            updateProgressSlider();
        }

        function showFallbackShareModal() {
            const modal = document.getElementById('share-modal');
            const preview = document.getElementById('story-card-preview');
            preview.innerHTML = getResultCardHTML(winningCard);
            preview.firstElementChild.style.height = '100%';
            preview.firstElementChild.style.width = '100%';
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeShare() {
            const modal = document.getElementById('share-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function isMobileDevice() {
            return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.matchMedia('(pointer: coarse)').matches;
        }

        function updateInstagramButtonVisibility() {
            const btn = document.getElementById('instagram-share-btn');
            if (!btn) return;
            btn.style.display = isMobileDevice() ? 'inline-flex' : 'none';
        }

        async function loadCardImage(card) {
            const response = await fetch(card.image);
            if (!response.ok) throw new Error(`Failed to load ${card.image}`);
            return await response.blob();
        }

        async function buildStoryBlob() {
            if (!winningCard) throw new Error('No card selected yet');
            const canvas = document.createElement('canvas');
            canvas.width = 1080;
            canvas.height = 1920;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const offsetY = Math.round(canvas.height * 0.08);

            const blob = await loadCardImage(winningCard);
            const bitmap = await createImageBitmap(blob);
            const title = `GROUND ZERO CARD #${winningCard.id}`;

            ctx.textAlign = 'center';
            ctx.fillStyle = '#ffffff';
            ctx.font = '700 46px Helvetica Neue, Helvetica, Arial, sans-serif';
            ctx.fillText(title, canvas.width / 2, 140 + offsetY);
            ctx.font = '700 28px Helvetica Neue, Helvetica, Arial, sans-serif';
            ctx.fillStyle = '#a1a1aa';
           

            const maxW = 820;
            const maxH = 1092;
            const scale = Math.min(maxW / bitmap.width, maxH / bitmap.height);
            const drawW = Math.round(bitmap.width * scale);
            const drawH = Math.round(bitmap.height * scale);
            const drawX = Math.round((canvas.width - drawW) / 2);
            const drawY = 290 + offsetY;

            ctx.fillStyle = '#090909';
            ctx.fillRect(drawX - 26, drawY - 26, drawW + 52, drawH + 52);
            ctx.strokeStyle = '#232323';
            ctx.lineWidth = 4;
            ctx.strokeRect(drawX - 26, drawY - 26, drawW + 52, drawH + 52);
            ctx.drawImage(bitmap, drawX, drawY, drawW, drawH);

            ctx.fillStyle = '#ffffff';
            ctx.font = '700 34px Helvetica Neue, Helvetica, Arial, sans-serif';
            
            ctx.fillStyle = '#71717a';
            ctx.font = '700 22px Helvetica Neue, Helvetica, Arial, sans-serif';
            ctx.fillText('GROUND ZERO — NOANGELSS, BLACKAWASAKI', canvas.width / 2, drawY + drawH + 165);
            

            const pngBlob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
            if (!pngBlob) throw new Error('Could not create image');
            return pngBlob;
        }

        async function downloadStoryCard() {
            const blob = await buildStoryBlob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ground-zero-card-${winningCard.id}.png`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        async function openShare() {
            const shareTitle = 'GROUND ZERO — NOANGELSS';
            const shareText = `I pulled GROUND ZERO CARD #${winningCard.id}. Add the song GROUND ZERO — NOANGELSS, BLACKAWASAKI in Instagram Music.`;
            const shareUrl = window.location.href;
            try {
                const storyBlob = await buildStoryBlob();
                const storyFile = new File([storyBlob], `ground-zero-card-${winningCard.id}.png`, { type: 'image/png' });
                if (navigator.canShare && navigator.canShare({ files: [storyFile] })) {
                    await navigator.share({ title: shareTitle, text: shareText, files: [storyFile] });
                    return;
                }
                if (navigator.share) {
                    await navigator.share({ title: shareTitle, text: shareText, url: shareUrl });
                    return;
                }
            } catch (error) {
                console.log('Native share unavailable', error);
            }
            showFallbackShareModal();
        }

        async function shareToInstagram() {
            try {
                const storyBlob = await buildStoryBlob();
                const storyFile = new File([storyBlob], `ground-zero-card-${winningCard.id}.png`, { type: 'image/png' });
                const shareText = `GROUND ZERO CARD #${winningCard.id} — add GROUND ZERO in Instagram Music.`;
                if (navigator.canShare && navigator.canShare({ files: [storyFile] })) {
                    await navigator.share({ files: [storyFile], title: 'Share to Instagram', text: shareText });
                    return;
                }
                await downloadStoryCard();
                const scheme = /iPhone|iPad|iPod/i.test(navigator.userAgent) ? 'instagram://camera' : 'instagram://story-camera';
                window.location.href = scheme;
            } catch (error) {
                console.log('Instagram share fallback', error);
                showFallbackShareModal();
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            initMachine();
            updateInstagramButtonVisibility();
            startAmbientSpin();
        });
    </script>
</body>
